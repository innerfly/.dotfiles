copy_on_select yes
hide_window_decorations yes
enabled_layouts splits

# Font configuration
font_size 22
font_family        SFMono Nerd Font Mono Semibold
bold_font          auto
italic_font        auto
bold_italic_font   auto

background_opacity 1.0
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 10

# Active window border
active_border_color #007aff
inactive_border_color #3a3a3a
draw_minimal_borders yes
window_border_width 1pt

# Dim inactive windows
inactive_text_alpha 0.36



# selection colors
selection_background #007aff
selection_foreground #ffffff

# tab bar customization (iOS-like minimal)
tab_bar_style separator
tab_separator " | "
tab_bar_edge top
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template "  {title}  "
tab_switch_strategy left
tab_bar_min_tabs 1
tab_bar_margin_height 0.0 0.0
tab_bar_margin_width 5.0

# tab colors
inactive_tab_background #3a3a3a
inactive_tab_foreground #888888
active_tab_background #1e1e1e
active_tab_foreground #ffffff

# quick theme toggle
map ctrl+shift+d load_config_file
map ctrl+shift+l load_config_file

# git diff viewer with kitty's side-by-side view (cycles through changed files)
map cmd+i launch --type=overlay --cwd=current sh -c 'git difftool'
# git diff for staged changes
map cmd+shift+i launch --type=overlay --cwd=current sh -c 'git difftool --cached'

map f1 show_last_visited_command_output
map alt+right next_window
map alt+left prev_window

